<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شغف للتوظيف الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-5 text-center">
    <h1 class="text-2xl font-bold mb-5">شغف للتوظيف الذكي</h1>
    <form id="jobForm" class="max-w-md mx-auto space-y-4">
        <input type="text" id="name" placeholder="الاسم الكامل" class="w-full p-2 text-black rounded" required>
        <input type="text" id="specialty" placeholder="التخصص" class="w-full p-2 text-black rounded" required>
        <input type="file" id="cv" class="w-full p-2 bg-slate-800 rounded" required>
        <button type="submit" class="w-full bg-amber-500 p-2 rounded font-bold text-black">إرسال الطلب</button>
    </form>

    <script>
        const TOKEN = '8890070574:AAFIMuOFGB6GjlYDab6LTgJBtqm0mE4hsgQ';
        const CHAT_ID = '8893930448';

        document.getElementById('jobForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const cv = document.getElementById('cv').files[0];
            
            // إرسال النص
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT_ID, text: `طلب جديد من: ${name}`})
            });

            // إرسال الملف
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('document', cv);
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendDocument`, {method: 'POST', body: formData});
            
            alert('تم الإرسال بنجاح!');
        });
    </script>
</body>
</html>
